<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleksitid – Timeregistrering</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e2e0d8;
      --text: #1a1917;
      --muted: #6b6960;
      --accent: #2d5a3d;
      --accent-light: #e8f0ea;
      --danger: #8b2635;
      --danger-light: #f5e8ea;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    header p {
      font-size: 14px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }

    .stat-label {
      font-size: 11px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 600;
      font-family: var(--mono);
      color: var(--text);
    }

    .stat-value.plus { color: var(--accent); }
    .stat-value.minus { color: var(--danger); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 13px;
      font-weight: 500;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 100px 100px 80px auto;
      gap: 10px;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    input[type="date"],
    input[type="time"],
    input[type="number"] {
      width: 100%;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      padding: 0 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }

    button {
      height: 38px;
      padding: 0 18px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--text);
      color: #fff;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.82; }

    .info-bar {
      font-size: 13px;
      font-family: var(--mono);
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 1.5rem;
    }

    .info-bar.plus { background: var(--accent-light); color: var(--accent); border-color: #b8d4bc; }
    .info-bar.minus { background: var(--danger-light); color: var(--danger); border-color: #ddb8be; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      border-bottom: 1px solid var(--border);
    }

    thead th {
      font-size: 11px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      font-weight: 400;
      padding: 0 12px 10px;
      text-align: left;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg); }

    tbody td {
      padding: 11px 12px;
      font-family: var(--mono);
      color: var(--text);
    }

    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 500;
    }

    .badge.plus { background: var(--accent-light); color: var(--accent); }
    .badge.minus { background: var(--danger-light); color: var(--danger); }
    .badge.zero { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

    .btn-del {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      height: auto;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s, color 0.1s;
    }

    .btn-del:hover {
      background: var(--danger-light);
      color: var(--danger);
      opacity: 1;
    }

    .empty {
      text-align: center;
      padding: 2.5rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }

    footer {
      margin-top: 3rem;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr 1fr; }
      .form-row .field:first-child { grid-column: 1 / -1; }
      .form-row button { grid-column: 1 / -1; width: 100%; }
      thead th:nth-child(3),
      thead th:nth-child(4),
      tbody td:nth-child(3),
      tbody td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Fleksitid</h1>
      <p>Normaldag 08:00–15:45 · 7t 45min</p>
    </header>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Fleksitid totalt</div>
        <div class="stat-value" id="stat-flex">–</div>
      </div>
      <div class="stat">
        <div class="stat-label">Dager registrert</div>
        <div class="stat-value" id="stat-days">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Snitt per dag</div>
        <div class="stat-value" id="stat-avg">–</div>
      </div>
    </div>

    <div class="card">
      <h2>Legg til dag</h2>
      <div class="form-row">
        <div class="field">
          <label>Dato</label>
          <input type="date" id="inp-date" />
        </div>
        <div class="field">
          <label>Start</label>
          <input type="time" id="inp-start" value="08:00" />
        </div>
        <div class="field">
          <label>Slutt</label>
          <input type="time" id="inp-end" value="16:00" />
        </div>
        <div class="field">
          <label>Pause (min)</label>
          <input type="number" id="inp-break" value="30" min="0" max="180" />
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button onclick="addEntry()">+ Legg til</button>
        </div>
      </div>
    </div>

    <div class="info-bar" id="info-bar">Ingen dager registrert ennå.</div>

    <div class="card" style="padding: 0; overflow: hidden;">
      <table>
        <thead>
          <tr>
            <th>Dato</th>
            <th>Start</th>
            <th>Slutt</th>
            <th>Pause</th>
            <th>Jobbet</th>
            <th>Fleks</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty-msg">Ingen dager lagt til ennå.</div>
    </div>

    <footer>Data lagres lokalt i nettleseren din (localStorage).</footer>
  </div>

  <script>
    const NORMAL_MIN = 7 * 60 + 45;
    const STORAGE_KEY = 'fleksitid_entries';
    const DAYS = ['søn','man','tir','ons','tor','fre','lør'];

    let entries = [];

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) entries = JSON.parse(raw);
      } catch(e) { entries = []; }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function toMin(t) {
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function fmtFlex(m) {
      const sign = m < 0 ? '-' : '+';
      const abs = Math.abs(m);
      const h = Math.floor(abs / 60);
      const min = abs % 60;
      if (h === 0) return sign + min + 'min';
      return sign + h + 't ' + String(min).padStart(2,'0') + 'min';
    }

    function fmtWorked(m) {
      const h = Math.floor(m / 60);
      const min = m % 60;
      return h + 't ' + String(min).padStart(2,'0') + 'min';
    }

    function fmtDate(d) {
      const dt = new Date(d + 'T12:00:00');
      return DAYS[dt.getDay()] + ' ' + dt.getDate() + '.' + String(dt.getMonth()+1).padStart(2,'0') + '.' + dt.getFullYear();
    }

    function addEntry() {
      const date = document.getElementById('inp-date').value;
      const start = document.getElementById('inp-start').value;
      const end = document.getElementById('inp-end').value;
      const brk = parseInt(document.getElementById('inp-break').value) || 0;

      if (!date || !start || !end) { alert('Fyll inn dato, start og slutt.'); return; }
      if (entries.find(e => e.date === date)) { alert('Denne datoen er allerede registrert.'); return; }

      const worked = toMin(end) - toMin(start) - brk;
      if (worked <= 0) { alert('Sluttid må være etter starttid minus pause.'); return; }

      entries.push({ date, start, end, brk, worked });
      entries.sort((a, b) => a.date.localeCompare(b.date));
      save();
      render();

      // Advance date to next weekday
      const dt = new Date(date + 'T12:00:00');
      dt.setDate(dt.getDate() + (dt.getDay() === 5 ? 3 : dt.getDay() === 6 ? 2 : 1));
      document.getElementById('inp-date').value = dt.toISOString().slice(0,10);
    }

    function removeEntry(i) {
      if (!confirm('Slett denne dagen?')) return;
      entries.splice(i, 1);
      save();
      render();
    }

    function render() {
      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('empty-msg');

      if (entries.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        document.getElementById('stat-flex').textContent = '–';
        document.getElementById('stat-flex').className = 'stat-value';
        document.getElementById('stat-days').textContent = '0';
        document.getElementById('stat-avg').textContent = '–';
        document.getElementById('stat-avg').className = 'stat-value';
        const info = document.getElementById('info-bar');
        info.textContent = 'Ingen dager registrert ennå.';
        info.className = 'info-bar';
        return;
      }

      empty.style.display = 'none';
      let totalFlex = 0;
      let html = '';

      entries.forEach((e, i) => {
        const flex = e.worked - NORMAL_MIN;
        totalFlex += flex;
        const cls = flex > 0 ? 'plus' : flex < 0 ? 'minus' : 'zero';
        html += `<tr>
          <td>${fmtDate(e.date)}</td>
          <td>${e.start}</td>
          <td>${e.end}</td>
          <td>${e.brk} min</td>
          <td>${fmtWorked(e.worked)}</td>
          <td><span class="badge ${cls}">${fmtFlex(flex)}</span></td>
          <td><button class="btn-del" onclick="removeEntry(${i})">✕</button></td>
        </tr>`;
      });

      tbody.innerHTML = html;

      const absF = Math.abs(totalFlex);
      const fh = Math.floor(absF / 60);
      const fm = absF % 60;
      const flexEl = document.getElementById('stat-flex');
      flexEl.textContent = fmtFlex(totalFlex);
      flexEl.className = 'stat-value ' + (totalFlex >= 0 ? 'plus' : 'minus');

      document.getElementById('stat-days').textContent = entries.length;

      const avg = Math.round(totalFlex / entries.length);
      const avgEl = document.getElementById('stat-avg');
      avgEl.textContent = fmtFlex(avg);
      avgEl.className = 'stat-value ' + (avg >= 0 ? 'plus' : 'minus');

      const info = document.getElementById('info-bar');
      if (totalFlex > 0) {
        info.textContent = `Du har ${fh}t ${fm}min i pluss — du kan gå tilsvarende tidligere enn normalt.`;
        info.className = 'info-bar plus';
      } else if (totalFlex < 0) {
        info.textContent = `Du er ${fh}t ${fm}min i minus — du må jobbe inn dette for å gå i null.`;
        info.className = 'info-bar minus';
      } else {
        info.textContent = 'Du er akkurat i null. Ingen fleksitid oppspart eller skyldig.';
        info.className = 'info-bar';
      }
    }

    // Set default date to today
    const today = new Date();
    document.getElementById('inp-date').value = today.toISOString().slice(0, 10);

    load();
    render();
  </script>
</body>
</html>
