<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleksitid – Timeregistrering</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
 <link rel="stylesheet" href="fleksi.css" />
<script src="fleksi.js"></script>
</head>
<body>
  <div class="page">
    <header>
      <h1>Fleksitid</h1>
      <p>Normaldag 08:00–15:45 · 7t 45min</p>
    </header>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Fleksitid totalt</div>
        <div class="stat-value" id="stat-flex">–</div>
      </div>
      <div class="stat">
        <div class="stat-label">Dager registrert</div>
        <div class="stat-value" id="stat-days">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Snitt per dag</div>
        <div class="stat-value" id="stat-avg">–</div>
      </div>
    </div>

    <div class="card">
      <h2>Legg til dag</h2>
      <div class="form-row">
        <div class="field">
          <label>Dato</label>
          <input type="date" id="inp-date" />
        </div>
        <div class="field">
          <label>Start</label>
          <input type="time" id="inp-start" value="08:00" />
        </div>
        <div class="field">
          <label>Slutt</label>
          <input type="time" id="inp-end" value="16:00" />
        </div>
        <div class="field">
          <label>Pause (min)</label>
          <input type="number" id="inp-break" value="30" min="0" max="180" />
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button onclick="addEntry()">+ Legg til</button>
        </div>
      </div>
    </div>

    <div class="info-bar" id="info-bar">Ingen dager registrert ennå.</div>

    <div class="card" style="padding: 0; overflow: hidden;">
      <table>
        <thead>
          <tr>
            <th>Dato</th>
            <th>Start</th>
            <th>Slutt</th>
            <th>Pause</th>
            <th>Jobbet</th>
            <th>Fleks</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty-msg">Ingen dager lagt til ennå.</div>
    </div>

    <footer>Data lagres lokalt i nettleseren din (localStorage).</footer>
  </div>


</body>
</html>
